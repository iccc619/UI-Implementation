<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="header">
    <nav class="nav">
        <div class="nav-left"></div>
        <div class="logo">
            <button class="logo-btn" aria-label="Logo">
                <a href="index.html"><img src="Assets/Logo.svg" alt=""></a>
            </button>
        </div>
        <div class="nav-right"></div>
    </nav>
</header>

<main class="page-shell">

    <section class="confirmation-head">
        <div class="success-icon">
            <img src="Assets/Check.svg">
        </div>
        <h1>Thank you for your order!</h1>
    </section>

    <section class="confirmation-grid">
        <article class="checkout-left">
            <form class="info-form">
    
                <p class="body-1 confirmation-message" id="confirmation-message"></p>
    
                <h2>Order Details</h2>
                <div class="info-list">
                    <div class="info-line">
                        <p class="body-2">Order Total</p>
                        <p class="body-2" id="final-total">$00.00</p>
                    </div>
    
                    <div class="info-line">
                        <p class="body-2">Order Number</p>
                        <p class="body-2" id="final-order-number">0000000000</p>
                    </div>
    
                    <div class="info-line">
                        <p class="body-2">Estimated Arrival</p>
                        <p class="body-2" id="final-arrival">—</p>
                    </div>
    
                    <div class="info-line">
                        <p class="body-2">Ship to</p>
                        <p class="body-2 final-address" id="final-ship-to">—</p>
                    </div>
                </div>
    
                <button type="button" id="homepage-btn" class="main-btn body-2-bold" onclick="returnHomeAndClearOrder()">
                    Return to Homepage
                </button>
                    
            </form>
        </article>
    
        <aside class="checkout-summary open">
            <button class="summary-toggle" onclick="toggleOrderSummary()">
                <h2>Order Summary</h2>
                <svg class="summary-arrow" width="16" height="16" viewBox="0 0 16 16">
                    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
    
            <div class="summary-content" id="summary-content">
                <div class="summary-items" id="summary-items"></div>
            </div>
    
            <div class="summary-total">
                <p class="body-1-medium">Order Total</p>
                <p class="body-1-medium" id="summary-final-total">$00.00</p>
            </div>
        </aside>
    </section>
</main>

<footer class="footer" style="background-color: var(--color-bg-primary)">
    <div class="footer-bottom">
        <div class="footer-divider"></div>
        <p class="caption-para">© 2005-2024 AustralianLight Landscape Imagery Exclusive & Unique Australian Landscape Photography</p>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
