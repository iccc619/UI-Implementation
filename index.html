<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    
<header class="header">
    <nav class="nav">
        <div class="nav-left">
            <button class="menu-btn" aria-label="Open menu">
                <img src="Assets/Menu.svg" alt="">
            </button>
            <button class="search-btn" aria-label="Search">
                <img src="Assets/Search.svg" alt="">
            </button>
        </div>

        <div class="logo" viewBox="0 0 74 50">
            <button clas="logo-btn" aria-label="Logo">
                <img src="Assets/Logo.svg" alt="">
            </button>
        </div>

        <div class="nav-right">
            <button class="cart-btn" aria-label="Shopping cart">
                <img src="Assets/Cart.svg" alt="">
            </button>
        </div>
    </nav>
</header>

<section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 class="hero-title h1">Welcome to AustralianLight Landscape Photography</h1>
        <p class="hero-description body-1">
            AustralianLight is the collective work of two Australian landscape photographers, Russell Stewart and Bernie Zajac. Please enjoy our gallery and we welcome your stay.
        </p>
        <a href="#latest release" class="btn-primary body-2-bold">
            Browse Gallery
            <img src="Assets/Arrow.svg" alt="Arrow">
        </a>
    </div>
</section>

</body>
</html>
