<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="header">
    <nav class="nav">
        <div class="nav-left">
            <button aria-label="Back">
                <a href="index.html"><img src="Assets/Arrow.svg" alt="" style="transform: scaleX(-1);"></a>
            </button>
        </div>

        <div class="logo">
            <button class="logo-btn" aria-label="Logo">
                <a href="index.html"><img src="Assets/Logo.svg" alt=""></a>
            </button>
        </div>

        <div class="nav-right"></div>
    </nav>
</header>

<main class="page-shell grid">

    <article class="checkout-left">
        <form class="info-form">

            <h2>Contact</h2>
            <div class="form-list">
                <input type="text" id="contact-first-name" placeholder="First name" class="checkout-input body-2">
                <input type="text" id="contact-last-name" placeholder="Last name" class="checkout-input body-2">
                <input type="email" id="contact-email" placeholder="Email" class="checkout-input body-2">
                <input type="tel" id="contact-phone" placeholder="Phone" class="checkout-input body-2">
            </div>

            <h2>Address</h2>
            <div class="form-list">
                <input type="text" id="address-address" placeholder="Address" class="checkout-input body-2">
                <input type="text" id="address-suburb" placeholder="Suburb" class="checkout-input body-2">
                <input type="text" id="address-postcode" placeholder="Postcode" class="checkout-input body-2">
                
                <label class="option-group">
                    <select id="address-state" class="option-select body-2">
                        <option value="" selected disabled>State</option>
                        <option>Australian Capital Territory</option>
                        <option>New South Wales</option>
                        <option>Northern Territory</option>
                        <option>South Australia</option>
                        <option>Queensland</option>
                        <option>Tasmania</option>
                        <option>Victoria</option>
                        <option>Western Australia</option> 
                        <option>Other (state above)</option>                           
                    </select>
                    <svg class="arrow" width="16" height="16" viewBox="0 0 16 16">
                        <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </label>

                <label class="option-group">
                    <select id="address-country" class="option-select body-2">
                        <option>Australia</option>
                        <option>New Zealand</option>
                        <option>China</option>
                        <option>Japan</option>
                        <option>South Korea</option>
                        <option>United States</option>
                        <option>Canada</option>
                        <option>United Kingdom</option>
                    </select>
                    <svg class="arrow" width="16" height="16" viewBox="0 0 16 16">
                        <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </label>
            </div>

            <button type="button" id="payment-btn" class="main-btn body-2-bold" onclick="saveCheckoutInfo()" disabled>
                Continue to Payment
            </button>
                
            <button type="button" class="return-cart-btn caption" onclick="openCart()">
                <img src="Assets/Arrow.svg" style="transform: scaleX(-1);" alt="">
                Return to Cart
            </button>
        </form>
    </article>

    <aside class="checkout-summary open">
        <button class="summary-toggle" onclick="toggleOrderSummary()">
            <h2>Order Summary</h2>
            <svg class="summary-arrow" width="16" height="16" viewBox="0 0 16 16">
                <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <div class="summary-content" id="summary-content">
            <div class="summary-items" id="summary-items"></div>
        </div>

        <div class="summary-total">
            <p class="body-1-medium">Subtotal <span class="caption">(ex. GST)</span></p>
            <p class="body-1-medium" id="summary-subtotal">$00.00</p>
        </div>
    </aside>

</main>

<footer class="footer" style="background-color: var(--color-bg-primary)">
    <div class="footer-bottom">
        <div class="footer-divider"></div>
        <p class="caption-para">© 2005-2024 AustralianLight Landscape Imagery Exclusive & Unique Australian Landscape Photography</p>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
